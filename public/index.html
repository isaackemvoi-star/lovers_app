<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Lovers Chat</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

  <link
    rel="manifest"
    href="manifest.json"
  >

  <meta
    name="theme-color"
    content="#ff4d6d"
  >

</head>

<body>

<!-- AUTH -->

<div id="auth">

  <div class="authBox">

    <h2>💖 Lovers Chat</h2>

    <input
      type="email"
      id="email"
      placeholder="Enter Email"
    >

    <input
      type="password"
      id="password"
      placeholder="Enter Password"
    >

    <div class="authButtons">

      <button onclick="signup()">
        Signup
      </button>

      <button onclick="login()">
        Login
      </button>

    </div>

  </div>

</div>

<!-- APP -->
<button
        class="menuBtn"
        onclick="toggleMenu()"
      >
        ⋮
      </button>

<div
  id="app"
  style="display:none;"
>

  <!-- TOP BAR -->

  <div class="top">

    <div class="topLogo">
      💖 Lovers Chat
    </div>

    <div class="topActions">

      <span id="me"></span>

    </div>

  </div>

  <!-- MENU -->

  <div
    id="menu"
    class="menu"
  >

    <button onclick="saveMood()">
      💭 Set Mood
    </button>

    <button onclick="saveLoveLanguage()">
      💝 Love Language
    </button>

    <button onclick="generateDateIdea()">
      🎲 Date Idea
    </button>

    <button onclick="waterPlant()">
      🪴 Shared Plant
    </button>

    <button onclick="sendSOS()">
      🆘 SOS
    </button>

    <button onclick="downloadChat()">
      💾 Backup Chat
    </button>

    <button onclick="voiceOnlyMode()">
      🎙 Voice Only
    </button>

    <button onclick="breakupMode()">
      💔 Breakup Switch
    </button>

    <button onclick="logout()">
      🚪 Logout
    </button>

  </div>

  <!-- MAIN -->

  <div class="main">

    <!-- SIDEBAR -->

    <div class="sidebar">

      <!-- SEARCH -->

      <div class="searchArea">

        <input
          type="text"
          placeholder="Search chats"
          id="searchUser"
        >

      </div>

      <!-- CHAT LIST -->

      <div
        id="users"
        class="users"
      ></div>

    </div>

    <!-- CHAT SECTION -->

    <div class="chat">

      <!-- CHAT TOP -->

      <div class="chatTop">

        <div class="chatUserInfo">

          <div id="chatUser">
            Select Chat
          </div>

          <div class="statusRow">

            <span id="moodText">
              💭 Mood
            </span>

            <span id="loveText">
              💝 Love Language
            </span>

          </div>

        </div>

        <div class="chatButtons">

          <button onclick="startCall()">
            📞
          </button>

          <button onclick="startVideoCall()">
            🎥
          </button>

        </div>

      </div>

      <!-- VIDEO -->

      <div class="videoContainer">

        <video
          id="localVideo"
          autoplay
          muted
          playsinline
        ></video>

        <video
          id="remoteVideo"
          autoplay
          playsinline
        ></video>

      </div>

      <!-- CHAT BOX -->

      <div id="box"></div>

      <!-- INPUT -->

      <div class="inputArea">

        <label class="fileBtn">

          📸

          <input
            type="file"
            id="imageInput"
            hidden
          >

        </label>

        <label class="fileBtn">

          🎵

          <input
            type="file"
            id="audioInput"
            hidden
          >

        </label>

        <input
          id="msg"
          placeholder="Type message..."
        >

        <button onclick="send()">
          ➤
        </button>

      </div>

    </div>

  </div>

</div>

<script
  type="module"
  src="app.js"
></script>

<script>

if (
  "serviceWorker" in navigator
) {

  navigator
    .serviceWorker
    .register("sw.js");

}

</script>

</body>
</html>
