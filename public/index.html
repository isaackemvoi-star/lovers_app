<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Lovers Chat</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

<!-- LOGIN -->

<div id="auth">

  <div class="authBox">

    <h2>💖 Lovers Chat</h2>

    <input
      type="email"
      id="email"
      placeholder="Enter Email"
    >

    <input
      type="password"
      id="password"
      placeholder="Enter Password"
    >

    <div class="authButtons">

      <button onclick="signup()">
        Signup
      </button>

      <button onclick="login()">
        Login
      </button>

    </div>

  </div>

</div>

<!-- APP -->

<div
  id="app"
  style="display:none;"
>

  <!-- SIDEBAR -->

  <div class="sidebar">

    <!-- TOP -->

    <div class="sidebarTop">

      <h2>Chats</h2>

      <div class="topIcons">

        <button
          class="menuBtn"
          onclick="toggleMenu()"
        >
          ⋮
        </button>

      </div>

    </div>

    <!-- MENU -->

    <div
      id="menu"
      class="menu"
      style="display:none;"
    >

      <button onclick="saveMood()">
        💭 Mood
      </button>

      <button onclick="saveLoveLanguage()">
        💝 Love Language
      </button>

      <button onclick="generateDateIdea()">
        🎲 Date Idea
      </button>

      <button onclick="waterPlant()">
        🪴 Shared Plant
      </button>

      <button onclick="sendSOS()">
        🆘 SOS
      </button>

      <button onclick="downloadChat()">
        💾 Backup
      </button>

      <button onclick="voiceOnlyMode()">
        🎙 Voice Only
      </button>

      <button onclick="breakupMode()">
        💔 Breakup
      </button>

      <button onclick="logout()">
        🚪 Logout
      </button>

    </div>

    <!-- SEARCH -->

    <div class="searchArea">

      <input
        type="text"
        placeholder="Search chats"
      >

    </div>

    <!-- USERS -->

    <div
      id="users"
      class="users"
    ></div>

  </div>

  <!-- CHAT AREA -->

  <div class="chatArea">

    <!-- CHAT HEADER -->

    <div class="chatHeader">

      <div class="chatLeft">

        <div class="avatar">
          💖
        </div>

        <div class="chatInfo">

          <div id="chatUser">
            Select Chat
          </div>

          <div class="statusRow">

            <span id="moodText">
              💭 Mood
            </span>

            <span id="loveText">
              💝 Love
            </span>

          </div>

        </div>

      </div>

      <!-- CALL BUTTONS -->

      <div class="chatActions">

        <button onclick="startCall()">
          📞
        </button>

        <button onclick="startVideoCall()">
          🎥
        </button>

      </div>

    </div>

    <!-- VIDEO -->

    <div class="videoContainer">

      <video
        id="localVideo"
        autoplay
        muted
        playsinline
      ></video>

      <video
        id="remoteVideo"
        autoplay
        playsinline
      ></video>

    </div>

    <!-- CHAT BOX -->

    <div id="box"></div>

    <!-- INPUT -->

    <div class="inputArea">

      <label class="fileBtn">

        📸

        <input
          type="file"
          id="imageInput"
          hidden
        >

      </label>

      <label class="fileBtn">

        🎵

        <input
          type="file"
          id="audioInput"
          hidden
        >

      </label>

      <input
        id="msg"
        placeholder="Type message..."
      >

      <button onclick="send()">
        ➤
      </button>

    </div>

  </div>

</div>

<script
  type="module"
  src="app.js"
></script>

</body>
</html>
