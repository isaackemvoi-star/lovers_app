<!-- LOGIN -->

<div id="auth">

  <div class="authBox">

    <h2>💖 Lovers Chat</h2>

    <!-- EMAIL -->

    <input
      type="email"
      id="email"
      placeholder="Enter Email"
    >

    <input
      type="password"
      id="password"
      placeholder="Enter Password"
    >

    <div class="authButtons">

      <button onclick="signup()">
        Signup
      </button>

      <button onclick="login()">
        Login
      </button>

    </div>

    <!-- DIVIDER -->

    <div class="divider">
      OR
    </div>

    <!-- PHONE LOGIN -->

    <input
      type="text"
      id="phone"
      placeholder="+254712345678"
    >

    <div id="recaptcha-container"></div>

    <button
      class="phoneBtn"
      onclick="sendOTP()"
    >
      Send OTP
    </button>

    <input
      type="text"
      id="otp"
      placeholder="Enter OTP"
    >

    <button
      class="verifyBtn"
      onclick="verifyOTP()"
    >
      Verify OTP
    </button>

  </div>

</div>
