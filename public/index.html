<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Lovers Chat</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

<!-- ================= AUTH PAGE ================= -->

<div id="authPage">

  <div class="authBox">

    <div class="logo">
      💖
    </div>

    <h2>
      Lovers Chat
    </h2>

    <input
      type="email"
      id="email"
      placeholder="Email"
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
    >

    <button onclick="login()">
      Login
    </button>

    <button onclick="signup()">
      Create Account
    </button>

    <div class="divider">
      OR
    </div>

    <input
      type="text"
      id="phoneNumber"
      placeholder="+254..."
    >

    <button onclick="sendPhoneCode()">
      Send OTP
    </button>

    <input
      type="text"
      id="otpCode"
      placeholder="Enter OTP"
    >

    <button onclick="verifyPhoneCode()">
      Verify OTP
    </button>

    <div id="recaptcha-container"></div>

  </div>

</div>

<!-- ================= APP ================= -->

<div id="app">

  <!-- SIDEBAR -->

  <div class="sidebar">

    <div class="sidebarTop">

      <h2>
        Chats
      </h2>

      <div class="sidebarIcons">

        <button onclick="toggleMenu()">
          ⋮
        </button>

      </div>

    </div>

    <!-- SEARCH -->

    <div class="searchArea">

      <input
        type="text"
        id="searchInput"
        placeholder="Search or start new chat"
      >

    </div>

    <!-- ADD CHAT -->

    <div class="newChatArea">

      <input
        type="text"
        id="newChatEmail"
        placeholder="Add user by email"
      >

      <button onclick="addNewChat()">
        +
      </button>

    </div>

    <!-- CHAT LIST -->

    <div
      id="chatList"
      class="chatList"
    ></div>

  </div>

  <!-- CHAT WINDOW -->

  <div class="chatWindow">

    <!-- HEADER -->

    <div class="chatHeader">

      <div class="headerLeft">

        <button
          class="mobileBack"
          onclick="
            document.body.classList.remove(
              'showChat'
            )
          "
        >
          ←
        </button>

        <div class="chatProfile">
          💖
        </div>

        <div>

          <div
            id="chatName"
            class="chatName"
          >
            Select chat
          </div>

          <div
            id="typingStatus"
            class="typingStatus"
          ></div>

        </div>

      </div>

      <div class="headerActions">

        <button onclick="startCall()">
          📞
        </button>

        <button onclick="startVideoCall()">
          🎥
        </button>

        <button onclick="toggleMenu()">
          ⋮
        </button>

      </div>

    </div>

    <!-- CALL AREA -->

    <div
      id="callArea"
      class="callArea"
    >

      <video
        id="localVideo"
        autoplay
        muted
        playsinline
      ></video>

      <video
        id="remoteVideo"
        autoplay
        playsinline
      ></video>

    </div>

    <!-- MESSAGES -->

    <div
      id="messages"
      class="messages"
    ></div>

    <!-- INPUT -->

    <div class="inputArea">

      <label class="inputBtn">

        📎

        <input
          type="file"
          id="imageInput"
          hidden
        >

      </label>

      <input
        type="text"
        id="msg"
        placeholder="Type a message"
      >

      <button onclick="send()">
        ➤
      </button>

    </div>

  </div>

</div>

<!-- MENU -->

<div id="menuBox">

  <button onclick="setMood()">
    💭 Mood Sync
  </button>

  <button onclick="setLoveLanguage()">
    💝 Love Language
  </button>

  <button onclick="waterPlant()">
    🌱 Shared Plant
  </button>

  <button onclick="downloadChat()">
    💾 Backup Chat
  </button>

  <button onclick="voiceOnlyMode()">
    🎙 Voice Only
  </button>

  <button onclick="sendSOS()">
    🆘 SOS
  </button>

  <button onclick="breakupMode()">
    💔 Breakup Mode
  </button>

  <button onclick="logout()">
    🚪 Logout
  </button>

</div>

<script
  type="module"
  src="app.js"
></script>

</body>
</html>
